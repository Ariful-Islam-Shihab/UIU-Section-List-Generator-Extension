<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 450px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h2 {
      margin-top: 0;
      color: #333;
      border-bottom: 2px solid #4CAF50;
      padding-bottom: 10px;
    }
    .status {
      margin: 10px 0;
      padding: 8px;
      background-color: #e7f3fe;
      border-left: 4px solid #2196F3;
    }
    .data-item {
      border: 1px solid #ddd;
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
    }
    .data-item:hover {
      background-color: #f5f5f5;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 5px;
    }
    button:hover {
      opacity: 0.9;
    }
    .clear {
      background-color: #f44336;
    }
    .no-data {
      color: #999;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h2>UCam Sections PDF Generator</h2>
  
  <div class="status" id="status">
    Initializing...
  </div>
  
  <div id="data-container">
    <div class="no-data">Loading...</div>
  </div>
  
  <div style="margin-top: 15px; text-align: center;">
    <button id="clear-all" class="clear">Clear All Data</button>
    <button id="refresh">Refresh</button>
  </div>

  <script src="lib/jspdf.umd.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
